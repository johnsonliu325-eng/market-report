name: Build and Deploy Morning Report

on:
  # 定时自动刷新已关闭：网站由本地 /发布 命令更新（数据+AI内容一起），
  # 避免云端无AI的自动刷新覆盖精选新闻/点评。
  push:
    branches: [main]        # 每次 /发布 推送后自动构建发布
  workflow_dispatch:        # 也允许手动点击触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate report HTML
        run: python3 build_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
